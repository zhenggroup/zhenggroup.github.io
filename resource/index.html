    <meta name="description" content="Find useful resources for electrochemistry research, including online lectures, lab systems, software recommendations, and learning materials from The Zheng Group.">

    <title>Resources - The Zheng Group</title>

    <style>
        /* Resource page clarity refresh */
        .section-heading,
        .resource-card h3,
        .software-list-item h3,
        .lab-system-buttons .btn {
            font-family: var(--font-family-sans-serif);
        }

        .section-heading {
            font-weight: 700;
            color: var(--text-color-headings);
            font-size: clamp(1.5rem, 2.2vw, 2rem);
            margin: 2.5rem 0 1rem;
            border-bottom: none;
            padding-bottom: 0;
            text-align: left;
            left: 0;
            transform: none;
            display: block;
        }

        .resource-intro {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            gap: 2rem;
            align-items: end;
            padding: 1.4rem 0 2rem;
            border-bottom: 1px solid rgba(0, 33, 71, 0.1);
            margin-bottom: 2rem;
        }

        .resource-intro h2 {
            margin: 0 0 0.6rem;
            color: var(--text-color-headings);
            font-size: clamp(1.8rem, 3vw, 2.7rem);
            line-height: 1.1;
            font-weight: 760;
        }

        .resource-intro p {
            max-width: 740px;
            margin: 0;
            color: var(--text-color-medium);
            font-size: 1.04rem;
            line-height: 1.65;
        }

        .resource-note-panel {
            padding: 1rem 1.1rem;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(0, 33, 71, 0.95), rgba(0, 23, 47, 0.95));
            color: #ffffff;
            box-shadow: 0 18px 38px rgba(0, 33, 71, 0.16);
        }

        .resource-note-panel strong {
            display: block;
            margin-bottom: 0.25rem;
            color: #ffffff;
            font-size: 0.95rem;
        }

        .resource-note-panel span {
            display: block;
            color: rgba(255, 255, 255, 0.74);
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .lab-system-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .lab-system-buttons .btn {
            min-height: 86px;
            padding: 1rem 1.1rem;
            border: 1px solid rgba(0, 33, 71, 0.08);
            border-radius: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: #fff;
            text-align: left;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.85rem;
            box-shadow: 0 16px 34px rgba(0, 33, 71, 0.1);
        }

        .lab-system-buttons .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 46px rgba(0, 33, 71, 0.16);
            color: #fff;
            text-decoration: none;
        }

        .lab-system-buttons .btn .fas {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            margin-right: 0;
            font-size: 1.15rem;
        }

        .lab-system-buttons .btn span {
            display: block;
            color: rgba(255, 255, 255, 0.74);
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.35;
        }

        .btn-booking { background: linear-gradient(135deg, var(--color-primary-blue), #0b3f74); }
        .btn-nas { background: linear-gradient(135deg, #6c5224, var(--color-gold)); }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .resource-card {
            background: #ffffff;
            padding: 1.25rem;
            margin-bottom: 0;
            border-radius: 8px;
            border: 1px solid rgba(0, 33, 71, 0.08);
            box-shadow: 0 16px 36px rgba(0, 33, 71, 0.06);
        }

        .resource-card h3 {
            font-size: 1.12rem;
            color: var(--text-color-headings);
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .resource-card p, .resource-card ul {
            margin-bottom: 0.85rem;
            line-height: 1.55;
            font-size: 0.98rem;
            color: var(--text-color-medium);
        }

        .resource-card ul { padding-left: 20px; }
        .resource-card li { margin-bottom: 0.45rem; }

        .resource-card a {
            padding: 0;
            border-radius: 0;
            border: none;
            background: transparent;
            color: var(--text-link-color);
            text-decoration: underline;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .resource-card a:hover {
            background: transparent;
            color: var(--text-link-hover-color);
        }

        .resource-card strong {
            font-weight: 700;
            color: var(--text-color-dark);
        }

        .resource-card .note {
            font-size: 0.86rem;
            font-weight: 400;
            color: var(--text-color-subtle);
            margin-left: 0.45rem;
            font-style: italic;
        }

        .resource-card.featured-resource {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
            gap: 1.3rem;
            align-items: start;
            background: linear-gradient(135deg, rgba(0, 33, 71, 0.04), rgba(185, 151, 91, 0.1));
        }

        .software-list-item {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .software-list-item h3 {
            margin-top: 0;
            font-size: 1.12rem;
            color: var(--text-color-headings);
            font-weight: 700;
        }

        .software-list-item .software-description {
            margin-bottom: 0.5rem;
            color: var(--text-color-medium);
            font-style: normal;
            font-size: 0.97rem;
        }

        .software-list-item ul {
            margin-top: 0.5rem;
            list-style-type: disc;
            color: var(--text-color-medium);
            font-size: 0.96rem;
            line-height: 1.55;
        }

        .software-list-item a {
            color: var(--text-link-color);
            text-decoration: underline;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .software-list-item a:hover {
            color: var(--text-link-hover-color);
        }

        .learning-resource-block {
            display: grid;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .resource-intro,
            .resource-card.featured-resource,
            .resource-grid {
                grid-template-columns: 1fr;
            }

            .lab-system-buttons {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .resource-card {
                padding: 1.15rem;
            }

            .section-heading {
                font-size: 1.5em;
            }
        }
        @media (max-width: 576px) {
            .resource-card h3 {
                font-size: 1.2em;
            }
        }
    </style>
    
</head>
