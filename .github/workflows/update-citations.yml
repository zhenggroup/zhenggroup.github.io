name: Update Citations Cache

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  update-citations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Fetch citation data
        run: node citation-fetcher.js
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Citation Bot"
          git add js/citations-cache.json
          git commit -m "chore: update citations cache" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
